project_name: keygent

before:
  hooks:
    - go mod tidy

builds:
  - id: keygent
    main: ./cmd/keygent
    binary: keygent
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: heshanthenura
    name: keygent
